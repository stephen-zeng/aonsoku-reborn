name: Deploy to OSS

on:
  push:
    branches:
      - deploy # 触发分支，根据你的实际情况修改

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '23' # 建议使用最新的 LTS 版本
          cache: 'pnpm'

      - name: Install dependency
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: To OSS
        uses: fangbinwei/aliyun-oss-website-action@v1
        with:
          accessKeyId: ${{ secrets.ACCESS_KEY_ID }}
          accessKeySecret: ${{ secrets.ACCESS_KEY_SECRET }}
          bucket: ${{ secrets.BUCKET_NAME }}
          endpoint: ${{ secrets.ENDPOINT }}
          # 打包产物目录，Vue 默认为 dist
          folder: dist
          # 开启增量上传（只上传变动的文件，极大提升速度）
          incremental: true
          # 自动清理 OSS 中多余的旧文件（保持 Bucket 干净）
          removeEveryday: false 
          # 针对模型大文件的优化：设置长缓存（30天）
          # 这会为非 html/js/css 的文件设置 Cache-Control 响应头
          otherCacheControl: 'max-age=2592000'
          # 针对 HTML 文件的优化：设置为不缓存（保证用户每次访问都是最新版）
          htmlCacheControl: 'no-cache'

      - name: Refresh CDN
        env:
          AK: ${{ secrets.ACCESS_KEY_ID }}
          SK: ${{ secrets.ACCESS_KEY_SECRET }}
        run: |
          curl -O https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz
          tar xzvf aliyun-cli-linux-latest-amd64.tgz
          sudo mv aliyun /usr/local/bin/
          aliyun configure set --profile default --mode AK --region cn-hangzhou --access-key-id $AK --access-key-secret $SK
          aliyun cdn RefreshObjectCaches --ObjectPath "https://music.0x535a.cn/" --ObjectType Directory