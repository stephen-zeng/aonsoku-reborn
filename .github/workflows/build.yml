name: "build"

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development
  workflow_dispatch:

jobs:
  build-electron:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            target: "mac"
            arch: "x64"
          - platform: "macos-latest"
            target: "mac"
            arch: "arm64"
          - platform: "ubuntu-22.04"
            target: "linux"
            arch: "x64"
          - platform: "ubuntu-22.04-arm"
            target: "linux"
            arch: "arm64"
          - platform: "windows-latest"
            target: "win"
            arch: "x64"
          - platform: "windows-11-arm"
            target: "win"
            arch: "arm64"
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install frontend dependencies
        run: pnpm install
        env:
          # Skip Cypress binary download on Windows ARM (unsupported platform)
          CYPRESS_INSTALL_BINARY: ${{ matrix.platform == 'windows-11-arm' && '0' || '' }}

      - name: Build Electron app
        env:
          ARCH: ${{ matrix.arch }}
        run: pnpm run build:${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-app-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/make/**/*.deb
            dist/make/**/*.rpm
            dist/make/**/*.dmg
            dist/make/**/*.zip
          if-no-files-found: warn
