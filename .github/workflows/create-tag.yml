name: Create Release Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.21.0)"
        required: true
        type: string
      build:
        description: "Build number (must be an integer, e.g., 21)"
        required: true
        type: string

jobs:
  create-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update package.json version
        run: |
          jq '.version = "${{ inputs.version }}"' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Update Android/iOS App Versions
        run: |
          npx capacitor-set-version -v "${{ inputs.version }}" -b "${{ inputs.build }}"

      - name: Commit version update
        run: |
          git config --local user.email "${{ github.actor }}@users.noreply.github.com"
          git config --local user.name "${{ github.actor }}"
          git add package.json android/app/build.gradle ios/App/App.xcodeproj/project.pbxproj
          git commit -m "Bump version to ${{ inputs.version }} (build ${{ inputs.build }})" || echo "No changes to commit"
          git push

      - name: Create and push tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"
