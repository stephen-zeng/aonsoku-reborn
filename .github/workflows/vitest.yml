name: Vitest

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  vitest:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Install dependencies
        run: pnpm install

      - name: Run Vitest
        run: pnpm test:unit
